<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест для бариста: От зерна до чашки</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f1ea;
            color: #333;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #6f4e37;
            border-bottom: 2px solid #6f4e37;
            padding-bottom: 15px;
        }
        /* Форма регистрации */
        #student-form {
            max-width: 400px;
            margin: 20px auto 30px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: border-color 0.2s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #6f4e37;
        }
        .form-group input.error {
            border-color: #dc3545;
        }
        #start-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #6f4e37;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        #start-btn:hover {
            background-color: #5a3e2c;
        }
        /* Тест */
        #quiz-section {
            display: none;
        }
        .question-block {
            margin-bottom: 25px;
            padding: 15px;
            border: 1px solid #e0d6c8;
            border-radius: 8px;
            background-color: #fff;
        }
        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 1.1em;
        }
        .option {
            display: block;
            padding: 12px 15px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .option:hover {
            background-color: #f9f5f0;
            border-color: #c8a27c;
        }
        .option input {
            margin-right: 10px;
            cursor: pointer;
        }
        .option.correct {
            background-color: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .option.incorrect {
            background-color: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .option.disabled {
            pointer-events: none;
        }
        #submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #6f4e37;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        #submit-btn:hover {
            background-color: #5a3e2c;
        }
        #result {
            text-align: center;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 30px;
            padding: 20px;
            border-radius: 8px;
            display: none;
        }
        .explanation {
            font-size: 0.9em;
            color: #555;
            margin-top: 10px;
            padding: 10px;
            background: #f8f9fa;
            border-left: 4px solid #6f4e37;
            display: none;
        }
        /* Статус отправки */
        #send-status {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            font-size: 0.95em;
            display: none;
        }
        #send-status.success {
            display: block;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #send-status.error {
            display: block;
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #send-status.sending {
            display: block;
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 20px 15px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>ТЕСТ ДЛЯ БАРИСТА: «ОТ ЗЕРНА ДО ЧАШКИ»</h1>

    <!-- Форма регистрации -->
    <div id="student-form">
        <div class="form-group">
            <label for="student-name">Ваше имя и фамилия</label>
            <input type="text" id="student-name" placeholder="Иван Иванов">
        </div>
        <div class="form-group">
            <label for="student-email">Ваш email</label>
            <input type="email" id="student-email" placeholder="ivan@example.com">
        </div>
        <button id="start-btn" type="button">Начать тест</button>
    </div>

    <!-- Тест -->
    <div id="quiz-section">
        <form id="quiz-form"></form>
        <button id="submit-btn">Проверить ответы</button>
        <div id="result"></div>
        <div id="send-status"></div>
    </div>
</div>

<script>
var FORMSPREE_URL = "https://formspree.io/f/xrewerad";

var studentName = "";
var studentEmail = "";
var sent = false;

var questions = [
    {
        text: "1. Какая идеальная температура взбитого молока для классического капучино?",
        options: ["А) 45–50 °C", "Б) 55–65 °C", "В) 70–75 °C", "Г) 80–85 °C"],
        correct: 1,
        explanation: "Оптимально 60°C. При такой температуре лактоза максимально сладкая, а белки не разрушены."
    },
    {
        text: "2. Какая температура эспрессо в чашке сразу после приготовления считается нормой?",
        options: ["А) 60–65 °C", "Б) 70–75 °C", "В) 85–90 °C", "Г) 95–100 °C"],
        correct: 1,
        explanation: "Эспрессо варится при 90–96 °C, но проходя через группу и попадая в чашку, он остывает до 70–75 °C."
    },
    {
        text: "3. Что произойдет с молоком, если его нагреть выше 70 °C при взбивании?",
        options: ["А) Оно станет слаще за счет карамелизации лактозы.", "Б) Белки денатурируют (свернутся), лактоза распадется, молоко начнет горчить и потеряет сладость.", "В) Оно станет более густым и будет лучше держать форму для латте-арта.", "Г) Ничего не изменится, просто будет горячее."],
        correct: 1,
        explanation: "Выше 70 °C молоко «сгорает», становится водянистым, сладость пропадает, появляется вкус кипяченого молока."
    },
    {
        text: "4. Вопрос с подвохом: Бариста забыл взвесить дозу кофе в портафильтре, но прессует и включает экстракцию. Эспрессо вытекает за 15 секунд, бледный и водянистый. В чем главная причина?",
        options: ["А) Температура воды в кофемашине слишком высокая.", "Б) Давление помпы упало ниже 9 бар.", "В) Кофе в холдере слишком мало (недозасып).", "Г) Кофе смололи слишком крупно."],
        correct: 2,
        explanation: "Подвох: если забыть взвесить кофе, доза будет нестабильной. Быстрый пролив и водянистость в первую очередь указывают на ошибку в дозировке (хотя крупный помол тоже может быть причиной, недозасып — прямое следствие невзвешивания)."
    },
    {
        text: "5. Вопрос с подвохом: Клиент просит сделать ему эспрессо «совсем без горечи, чтобы был сладкий». Какой из вариантов лучший?",
        options: ["А) Уменьшить дозу кофе на 2 грамма.", "Б) Снять пенку (крема) с готового эспрессо.", "В) Остановить экстракцию на 20 секундах, не дожидаясь 25-30.", "Г) Посоветовать ему другой напиток, так как эспрессо без горечи не существует."],
        correct: 3,
        explanation: "Эспрессо — это баланс. Без горечи (которая дает экстракция в конце) эспрессо будет невыносимо кислым. Лучше предложить фильтр-кофе или напиток с молоком."
    },
    {
        text: "6. Каков классический вес выхода (yield) двойного эспрессо при закладке 18 грамм кофе?",
        options: ["А) 18 грамм", "Б) 25 грамм", "В) 36 грамм", "Г) 50 грамм"],
        correct: 2,
        explanation: "Стандартное соотношение 1:2. 18г кофе = 36г напитка в чашке за 25-30 секунд."
    },
    {
        text: "7. Вопрос с подвохом: Что главное в правильной темперовке (утрамбовке) кофейной таблетки?",
        options: ["А) Приложить усилие ровно 15 кг.", "Б) Приложить усилие ровно 30 кг.", "В) Обеспечить абсолютно ровную и горизонтальную поверхность таблетки.", "Г) Сделать темперовку в два подхода: сначала легко, потом сильно."],
        correct: 2,
        explanation: "Усилие не имеет значения после 2-3 кг. Главное — ровность, иначе вода под давлением в 9 бар пробьет кривую таблетку сбоку (channeling)."
    },
    {
        text: "8. Сколько кофеина в стандартной чашке (200 мл) фильтр-кофе по сравнению с двойным эспрессо (60 мл)?",
        options: ["А) В фильтр-кофе кофеина меньше, так как он менее крепкий на вкус.", "Б) Кофеина примерно одинаково.", "В) В фильтр-кофе кофеина значительно больше.", "Г) В эспрессо кофеина больше, так как это концентрированный напиток."],
        correct: 2,
        explanation: "Из-за длительного контакта воды с кофе (3-5 минут) в фильтр экстрагируется гораздо больше кофеина (150-200 мг), чем в эспрессо (80-100 мг)."
    },
    {
        text: "9. Почему свежеобжаренный кофе (1-2 дня после обжарки) может дать рваную струйку при экстракции?",
        options: ["А) В зерне еще много углекислого газа (СО2), который мешает воде равномерно проходить через таблетку.", "Б) Зерно еще слишком влажное.", "В) Масло еще не вышло на поверхность зерна.", "Г) Кофемолка не настроена на такой помол."],
        correct: 0,
        explanation: "Свежеобжаренному кофе нужно «дегазироваться» 7-14 дней. Иначе СО2 выталкивает воду, создавая каналы прожига."
    },
    {
        text: "10. Чем отличается флэт уайт (Flat White) от капучино?",
        options: ["А) Во флэт уайт добавляют сироп, а в капучино — нет.", "Б) Во флэт уайте двойной ристретто/эспрессо и меньше густой пены (около 0.5 см).", "В) Во флэт уайте используется только овсяное молоко.", "Г) Капучино подается в стеклянном стакане, а флэт уайт в керамике."],
        correct: 1,
        explanation: "Во флэт уайте акцент на кофейном вкусе, пены минимум. В капучино пены 1.5-2 см."
    },
    {
        text: "11. Вопрос с подвохом: Эспрессо начал литься тонкой, очень темной струйкой с самого начала. Что это значит?",
        options: ["А) Экстракция идет идеально.", "Б) Кофейная таблетка имеет канал прожига (channeling) — вода нашла дырку.", "В) Помол слишком крупный.", "Г) Кофемашина перегрелась."],
        correct: 1,
        explanation: "Если струйка темная с самого начала, вода не проходит через весь кофе равномерно, а пробивает путь наименьшего сопротивления."
    },
    {
        text: "12. В чем разница между арабикой и робустой?",
        options: ["А) Арабика более горькая и содержит в 2 раза больше кофеина.", "Б) Робуста более горькая, землистая, содержит больше кофеина и дает больше крема.", "В) Разницы нет, это один и тот же вид растения.", "Г) Робуста всегда сладкая с ягодными нотами."],
        correct: 1,
        explanation: "Арабика — сладкая, кислая, сложная. Робуста — горькая, в ней в 2 раза больше кофеина, дает густую пенку."
    },
    {
        text: "13. Что нужно сделать в первую очередь, если эспрессо водянистый, бледный и течет 15 секунд?",
        options: ["А) Изменить помол в сторону «мельче».", "Б) Изменить помол в сторону «крупнее».", "В) Увеличить давление темперовки.", "Г) Добавить больше кофе в холдер."],
        correct: 0,
        explanation: "Быстрое течение = недоэкстракция. Делаем помол мельче, чтобы создать сопротивление воде."
    },
    {
        text: "14. Вопрос с подвохом: Клиент жалуется, что американо «мутный» и с пенкой, хотя просил «просто черный кофе». Почему?",
        options: ["А) Бариста налил кипяток из чайника с накипью.", "Б) Это натуральные кофейные масла и крема, которые поднимаются при добавлении воды.", "В) Зерно было слишком темной обжарки.", "Г) Фильтр в кофемашине порвался."],
        correct: 1,
        explanation: "«Мутность» — это эфирные масла и СО2. Клиент, привыкший к растворимому кофе, может этого не знать."
    },
    {
        text: "15. Как часто нужно чистить группу (холдер) от кофейных масел с помощью слепого сита?",
        options: ["А) Раз в неделю.", "Б) В конце каждой рабочей смены.", "В) Раз в месяц.", "Г) Только когда кофе начинает горчить."],
        correct: 1,
        explanation: "Кофейные масла прогоркают очень быстро. Чистка бэкофлешем обязательна каждый день в конце смены."
    }
];

document.addEventListener("DOMContentLoaded", function() {
    document.getElementById("start-btn").addEventListener("click", startQuiz);
    document.getElementById("submit-btn").addEventListener("click", checkAnswers);
});

function startQuiz() {
    var nameInput = document.getElementById("student-name");
    var emailInput = document.getElementById("student-email");
    var valid = true;

    if (!nameInput.value.trim()) { nameInput.classList.add("error"); valid = false; }
    else { nameInput.classList.remove("error"); }

    if (!emailInput.value.trim() || !emailInput.value.includes("@")) { emailInput.classList.add("error"); valid = false; }
    else { emailInput.classList.remove("error"); }

    if (!valid) return;

    studentName = nameInput.value.trim();
    studentEmail = emailInput.value.trim();

    document.getElementById("student-form").style.display = "none";
    document.getElementById("quiz-section").style.display = "block";

    var form = document.getElementById("quiz-form");
    questions.forEach(function(q, qIndex) {
        var html = '<div class="question-block"><div class="question-text">' + q.text + '</div>';
        q.options.forEach(function(opt, oIndex) {
            html += '<label class="option"><input type="radio" name="q' + qIndex + '" value="' + oIndex + '"> ' + opt + '</label>';
        });
        html += '<div class="explanation" id="explanation-' + qIndex + '"><strong>Объяснение:</strong> ' + q.explanation + '</div></div>';
        form.innerHTML += html;
    });
}

function checkAnswers() {
    var score = 0;
    var wrongList = [];

    questions.forEach(function(q, qIndex) {
        var options = document.querySelectorAll('input[name="q' + qIndex + '"]');
        document.getElementById("explanation-" + qIndex).style.display = "block";

        options.forEach(function(opt, oIndex) {
            var label = opt.parentElement;
            label.classList.add("disabled");
            label.classList.remove("correct", "incorrect");
            if (opt.checked) {
                if (oIndex === q.correct) { label.classList.add("correct"); score++; }
                else { label.classList.add("incorrect"); options[q.correct].parentElement.classList.add("correct"); wrongList.push(qIndex + 1); }
            }
        });
    });

    var pct = Math.round((score / questions.length) * 100);
    var passed = pct >= 70;
    var status = passed ? "СДАН" : "НЕ СДАН";
    var msg = pct === 100 ? "Идеально! Вы гуру кофемания!" : pct >= 70 ? "Отличный результат! Вы знаете свое дело." : pct >= 50 ? "Неплохо, но есть куда расти." : "Нужно подучить теорию.";

    var result = document.getElementById("result");
    result.style.display = "block";
    result.innerHTML = "Ваш результат: <span style='color:#6f4e37;'>" + score + "</span> из <span style='color:#6f4e37;'>" + questions.length + "</span> (" + pct + "%)<br><br><strong>Статус: " + status + "</strong><br><br>" + msg;
    result.scrollIntoView({ behavior: "smooth", block: "center" });

    sendResult(score, pct, status, wrongList);
}

function sendResult(score, pct, status, wrongList) {
    var statusDiv = document.getElementById("send-status");

    if (sent) {
        statusDiv.className = "error";
        statusDiv.textContent = "Результат уже был отправлен ранее.";
        return;
    }

    statusDiv.className = "sending";
    statusDiv.textContent = "Отправка результата...";
    statusDiv.style.display = "block";

    var now = new Date();
    var dateStr = now.toLocaleDateString("ru-RU") + " " + now.toLocaleTimeString("ru-RU");
    var wrongQuestions = wrongList.map(function(num) {
        return "Вопрос " + num + ": " + questions[num-1].text;
    }).join("\n");

    var payload = {
        "Имя": studentName,
        "Email": studentEmail,
        "Правильных ответов": score + " из " + questions.length,
        "Процент": pct + "%",
        "Статус": status,
        "Неправильные вопросы": wrongQuestions || "все верно",
        "Дата": dateStr,
        "_subject": "Результат экзамена: " + studentName + " — " + status,
        "_replyto": studentEmail
    };

    fetch(FORMSPREE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(function(response) {
        if (response.ok) {
            sent = true;
            statusDiv.className = "success";
            statusDiv.textContent = "Результат отправлен! Проверьте почту.";
        } else {
            throw new Error("Server " + response.status);
        }
    })
    .catch(function() {
        statusDiv.className = "error";
        statusDiv.textContent = "Не удалось отправить результат. Попробуйте обновить страницу.";
    });
}
</script>
</body>
</html>
