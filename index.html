<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест для бариста</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --accent: #ff6b35;
            --accent-hover: #ff8555;
            --correct: #00e676;
            --incorrect: #ff3d00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 3px;
        }

        .timer-display {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            font-variant-numeric: tabular-nums;
        }

        .screen {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }
        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        p.description {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .btn:hover { background-color: var(--accent-hover); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background-color: #555; cursor: not-allowed; }

        .question-number {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 15px;
            background-color: #2a2a2a;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        .option:hover {
            background-color: #333;
            border-color: #555;
        }
        .option.correct {
            border-color: var(--correct);
            background-color: rgba(0, 230, 118, 0.1);
            color: var(--correct);
        }
        .option.incorrect {
            border-color: var(--incorrect);
            background-color: rgba(255, 61, 0, 0.1);
            color: var(--incorrect);
        }

        #result-screen { text-align: center; }
        .score-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
            color: var(--accent);
        }
        .time-text {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }
        .result-message {
            font-size: 1.1rem;
            color: var(--text-main);
            margin-bottom: 30px;
        }
        .review-block {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .review-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3a3a3a;
        }
        .review-item:last-child { border-bottom: none; }
        .explanation {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 8px;
            font-style: italic;
        }
        .send-status {
            margin-top: 15px;
            font-size: 1rem;
            font-weight: normal;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress"></div>
    </div>

    <div id="start-screen" class="screen active">
        <h1>Тест для бариста</h1>
        <p class="description">Вам предстоит ответить на 20 вопросов. Перед началом представьтесь.</p>
        <input type="text" id="user-name" placeholder="Ваше Имя">
        <input type="text" id="user-surname" placeholder="Ваша Фамилия">
        <button class="btn" id="start-btn">Начать тест</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="timer-display">Время: <span id="timer">00:00</span></div>
        <div id="question-container"></div>
        <button class="btn" id="next-btn" style="margin-top: 30px;" disabled>Далее</button>
    </div>

    <div id="result-screen" class="screen">
        <h1>Тест завершен!</h1>
        <div class="score-text" id="score-text"></div>
        <div class="time-text" id="time-text"></div>
        <div class="result-message" id="result-message"></div>
        
        <div class="review-block" id="review-block"></div>
        
        <div class="send-status" id="send-status">Отправка результатов...</div>
    </div>
</div>

<script>
    const questions = [
        {
            text: "Какая идеальная температура взбитого молока для классического капучино?",
            options: ["45–50 °C", "55–65 °C", "70–75 °C", "80–85 °C"],
            correct: 1,
            explanation: "Оптимально 60°C. При такой температуре лактоза максимально сладкая, а белки не разрушены."
        },
        {
            text: "Какая температура эспрессо в чашке сразу после приготовления?",
            options: ["60–65 °C", "70–75 °C", "85–90 °C", "90–96 °C"],
            correct: 3,
            explanation: "Оптимальная температура воды при приготовлении эспрессо составляет 90–96 °C, что позволяет правильно экстрагировать вкус."
        },
        {
            text: "Что произойдет с молоком, если нагреть его выше 70 °C при взбивании?",
            options: ["Станет слаще.", "Белки свернутся, молоко начнет горчить.", "Станет более густым.", "Ничего не изменится."],
            correct: 1,
            explanation: "Свыше 70 °C белки денатурируют, сладость пропадает, появляется вкус кипяченого молока."
        },
        {
            text: "Сколько кофеина останется в чашке, если приготовить её из декафеинового кофе?",
            options: ["0%, кофеина нет вообще.", "Остается около 2-3%.", "Около 10%.", "Около 50%."],
            correct: 1,
            explanation: "Декофеинизация удаляет 97-99% кофеина. Абсолютного нуля достичь невозможно."
        },
        {
            text: "Клиент просит эспрессо «совсем без горечи, чтобы был сладкий». Лучший вариант?",
            options: ["Уменьшить дозу кофе.", "Снять крема.", "Остановить экстракцию раньше.", "Посоветовать другой напиток."],
            correct: 3,
            explanation: "Эспрессо — это баланс. Без горечи он будет невыносимо кислым. Лучше предложить фильтр или напиток с молоком."
        },
        {
            text: "Каков классический вес выхода двойного эспрессо при закладке 18 грамм кофе?",
            options: ["18 грамм", "25 грамм", "36 грамм", "50 грамм"],
            correct: 2,
            explanation: "Стандартное соотношение 1:2. 18г кофе = 36г напитка за 25-30 секунд."
        },
        {
            text: "Что главное в правильной темперовке (утрамбовке) кофейной таблетки?",
            options: ["Постучать темпером по холдеру.", "Нажать и прокрутить темпер по таблетке.", "Абсолютно ровная и горизонтальная поверхность.", "Сделать темперовку в два подхода."],
            correct: 2,
            explanation: "Усилие не важно после 2-3 кг. Главное — ровность, иначе вода под давлением пробьет таблетку сбоку."
        },
        {
            text: "Где кофеина больше: в чашке фильтр-кофе (200 мл) или в двойном эспрессо (60 мл)?",
            options: ["В фильтре меньше.", "Одинаково.", "В фильтре значительно больше.", "В эспрессо больше."],
            correct: 2,
            explanation: "Из-за долгого контакта воды с кофе (3-5 минут), в фильтре экстрагируется больше кофеина (150-200 мг)."
        },
        {
            text: "Почему свежеобжаренный кофе (1-2 дня) может дать рваную струйку при экстракции?",
            options: ["Много СО2 (углерода) мешает воде.", "Зерно влажное.", "Масло не вышло.", "Кофемолка неисправна."],
            correct: 0,
            explanation: "Свежеобжаренному кофе нужна дегазация 7-14 дней. Иначе СО2 выталкивает воду, образуя каналы."
        },
        {
            text: "Чем флэт уайт (Flat White) отличается от капучино?",
            options: ["Там есть сироп.", "Двойной эспрессо и меньше пены.", "Только овсяное молоко.", "Только посуда."],
            correct: 1,
            explanation: "Во флэт уайте акцент на кофейном вкусе (двойной шот) и тонкий слой микропены. В капучино пены 1.5-2 см."
        },
        {
            text: "Эспрессо льется тонкой, темной струйкой с самого начала. Это значит, что:",
            options: ["Все идеально.", "Образовался канал прожига.", "Помол крупный.", "Машина перегрелась."],
            correct: 1,
            explanation: "Темная струйка с начала означает, что вода нашла дырку в таблетке и пробивает её под давлением."
        },
        {
            text: "В чем главная разница между арабикой и робустой?",
            options: ["Арабика горче.", "Робуста горче, в ней больше кофеина и крема.", "Разницы нет.", "Робуста слаще."],
            correct: 1,
            explanation: "В робусте в 2 раза больше кофеина, она горькая, землистая и дает густую пенку (крема)."
        },
        {
            text: "Что нужно сделать, если эспрессо водянистый, бледный и течет 15 секунд (недоэкстракция)?",
            options: ["Сделать помол мельче.", "Сделать помол крупнее.", "Сильнее трамбовать.", "Добавить больше воды."],
            correct: 0,
            explanation: "Быстрое течение = крупный помол. Делаем помол мельче, чтобы увеличить сопротивление воде."
        },
        {
            text: "Клиент жалуется на «мутный» американо с пенкой. Почему так вышло?",
            options: ["Вода была слишком жесткой.", "Это кофейные масла и крема.", "Темная обжарка.", "Кофейная гуща попала в чашку."],
            correct: 1,
            explanation: "Мутность и пенка — это эфирные масла и углекислый газ. Это признак свежего кофе, а не брака."
        },
        {
            text: "Как часто нужно чистить группу (холдер) от масел с помощью слепого сита?",
            options: ["Раз в неделю.", "В конце каждой рабочей смены.", "Раз в месяц.", "Когда кофе начнет горчить."],
            correct: 1,
            explanation: "Кофейные масла прогоркают за один день. Чистка обязательна каждый вечер."
        },
        {
            text: "Какое давление воды в группе эспрессо-машины считается стандартом?",
            options: ["3 бар", "6 бар", "9 бар", "15 бар"],
            correct: 2,
            explanation: "Классический стандарт давления при экстракции эспрессо — 9 бар."
        },
        {
            text: "Какие вкусовые ноты экстрагируются в эспрессо в самую последнюю очередь (в конце пролива)?",
            options: ["Кислотность", "Сладость", "Горечь", "Тело (плотность)"],
            correct: 2,
            explanation: "Сначала экстрагируются кислоты, затем сахара (сладость/тело), и в самом конце — тяжелые горькие соединения."
        },
        {
            text: "Что означает термин «Honey process» (медовая обработка) зерна?",
            options: ["Зерно вымачивают в меде.", "Зерно сушат прямо с ягодой (натуральная обработка).", "Перед сушкой удаляют кожуру, но оставляют часть клейковины (мякоти).", "Зерно полируют до блеска."],
            correct: 2,
            explanation: "При медовой обработке снимают кожуру, но оставляют сахаристый слой (мицилаг/клейковину) на зерне во время сушки."
        },
        {
            text: "Зачем бариста делает 'прогон' (пролив воды без холдера) перед тем, как вставить холдер?",
            options: ["Чтобы согреть чашку.", "Чтобы промыть сито и стабилизировать температуру группы.", "Чтобы проверить давление помпы.", "Чтобы очистить паровик."],
            correct: 1,
            explanation: "Прогон смывает остатки старого кофе с душетки и стабилизирует температуру воды в группе перед экстракцией."
        },
        {
            text: "Какая жирность молока обычно считается оптимальной для стабильного латте-арта и баланса вкуса?",
            options: ["2.5%", "1.5%", "3.2% - 3.5%", "6%"],
            correct: 2,
            explanation: "Молоко 3.2-3.5% дает идеальный баланс сладости, текстуры пены и вкуса, не перебивая кофе."
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let userName = "";
    let userSurname = "";
    let userAnswers = [];
    
    let startTime = 0;
    let elapsedTime = 0;
    let timerInterval = null;

    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const progressBar = document.getElementById('progress');

    function startTimer() {
        startTime = Date.now();
        timerInterval = setInterval(() => {
            elapsedTime = Date.now() - startTime;
            document.getElementById('timer').innerText = formatTime(elapsedTime);
        }, 1000);
    }

    function formatTime(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function stopTimer() {
        clearInterval(timerInterval);
        elapsedTime = Date.now() - startTime;
    }

    document.getElementById('start-btn').addEventListener('click', () => {
        userName = document.getElementById('user-name').value.trim();
        userSurname = document.getElementById('user-surname').value.trim();
        
        if (!userName || !userSurname) {
            alert('Введите имя и фамилию!');
            return;
        }

        startScreen.classList.remove('active');
        quizScreen.classList.add('active');
        startTimer();
        showQuestion();
    });

    function showQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById('question-container');
        
        progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;

        container.style.animation = 'none';
        container.offsetHeight;
        container.style.animation = 'slideInRight 0.4s ease-out';

        container.innerHTML = `
            <div class="question-number">Вопрос ${currentQuestion + 1} из ${questions.length}</div>
            <div class="question-text">${q.text}</div>
            <div class="options-grid" id="options-grid"></div>
        `;

        const grid = document.getElementById('options-grid');
        q.options.forEach((option, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = option;
            div.addEventListener('click', () => selectOption(index, div));
            grid.appendChild(div);
        });

        document.getElementById('next-btn').disabled = true;
        document.getElementById('next-btn').innerText = currentQuestion === questions.length - 1 ? "Завершить тест" : "Далее";
    }

    function selectOption(index, element) {
        const q = questions[currentQuestion];
        const allOptions = document.querySelectorAll('.option');
        
        allOptions.forEach(opt => opt.style.pointerEvents = 'none');
        userAnswers.push(index);

        if (index === q.correct) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('incorrect');
            allOptions[q.correct].classList.add('correct');
        }

        document.getElementById('next-btn').disabled = false;
    }

    document.getElementById('next-btn').addEventListener('click', () => {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    });

    function showResults() {
        stopTimer();
        const finalTimeStr = formatTime(elapsedTime);

        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');
        progressBar.style.width = `100%`;

        document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
        document.getElementById('time-text').innerText = `Время прохождения: ${finalTimeStr}`;
        
        let percentage = (score / questions.length) * 100;
        let msg = "";
        if (percentage === 100) msg = "Идеально! Вы гуру кофемании ☕";
        else if (percentage >= 70) msg = "Отличный результат! Вы знаете свое дело.";
        else if (percentage >= 50) msg = "Неплохо, но есть куда расти.";
        else msg = "Нужно подучить теорию.";

        document.getElementById('result-message').innerText = msg;

        const reviewBlock = document.getElementById('review-block');
        reviewBlock.innerHTML = '';
        questions.forEach((q, i) => {
            let statusColor = userAnswers[i] === q.correct ? 'var(--correct)' : 'var(--incorrect)';
            let statusText = userAnswers[i] === q.correct ? 'Верно' : 'Неверно';
            
            reviewBlock.innerHTML += `
                <div class="review-item">
                    <div style="color:${statusColor}; font-weight:bold;">${i+1}. ${statusText}</div>
                    <div>${q.text}</div>
                    <div class="explanation">${q.explanation}</div>
                </div>
            `;
        });

        sendEmail(msg, finalTimeStr);
    }

    function sendEmail(message, timeStr) {
        const fullName = `${userName} ${userSurname}`;
        const subject = `Тест бариста: ${fullName}`;
        
        let answersReport = "Детали ответов:\n";
        questions.forEach((q, i) => {
            let isCorrect = userAnswers[i] === q.correct ? "Верно" : "Неверно";
            let chosenAnswer = q.options[userAnswers[i]];
            answersReport += `${i+1}. ${isCorrect} (Ответ: ${chosenAnswer})\n`;
        });

        const textMessage = `Имя: ${userName}\nФамилия: ${userSurname}\nРезультат: ${score} из ${questions.length}\nВремя прохождения: ${timeStr}\nКомментарий: ${message}\n\n${answersReport}`;

        const payload = {
            name: fullName,
            subject: subject,
            message: textMessage,
            _replyto: "Jyrbanay@mail.ru",
            _subject: subject
        };

        function trySend(attempt) {
            fetch("https://formspree.io/f/xrewerad", {
                method: "POST",
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if (response.ok) {
                    document.getElementById('send-status').innerHTML = "✅ Результат отправлен администратору.";
                    document.getElementById('send-status').style.color = "var(--correct)";
                } else if (attempt < 2) {
                    setTimeout(() => trySend(attempt + 1), 2000);
                } else {
                    document.getElementById('send-status').innerHTML = "⚠️ Ошибка отправки. Попробуйте обновить страницу.";
                    document.getElementById('send-status').style.color = "var(--incorrect)";
                }
            })
            .catch(() => {
                if (attempt < 2) {
                    setTimeout(() => trySend(attempt + 1), 2000);
                } else {
                    document.getElementById('send-status').innerHTML = "⚠️ Ошибка сети. Проверьте интернет и попробуйте снова.";
                    document.getElementById('send-status').style.color = "var(--incorrect)";
                }
            });
        }

        trySend(0);
    }
