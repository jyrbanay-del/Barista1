<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест для бариста</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #b0b0b0;
            --accent: #ff6b35; /* Оранжевый акцент */
            --accent-hover: #ff8555;
            --correct: #00e676; /* Яркий зеленый */
            --incorrect: #ff3d00; /* Яркий красный */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Прогресс-бар */
        .progress-bar-bg {
            width: 100%;
            height: 6px;
            background-color: #333;
            border-radius: 3px;
            margin-bottom: 30px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 3px;
        }

        /* Экраны */
        .screen {
            display: none;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }
        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Анимация выезжающего вопроса */
        @keyframes slideInRight {
            from { transform: translateX(50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        p.description {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus {
            border-color: var(--accent);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .btn:hover {
            background-color: var(--accent-hover);
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            background-color: #555;
            cursor: not-allowed;
        }

        /* Вопрос и варианты */
        .question-number {
            color: var(--accent);
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }
        .question-text {
            font-size: 1.3rem;
            margin-bottom: 25px;
            line-height: 1.4;
        }
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 15px;
            background-color: #2a2a2a;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 1rem;
        }
        .option:hover {
            background-color: #333;
            border-color: #555;
        }
        .option.selected {
            border-color: var(--accent);
            background-color: rgba(255, 107, 53, 0.1);
        }
        .option.correct {
            border-color: var(--correct);
            background-color: rgba(0, 230, 118, 0.1);
            color: var(--correct);
        }
        .option.incorrect {
            border-color: var(--incorrect);
            background-color: rgba(255, 61, 0, 0.1);
            color: var(--incorrect);
        }

        /* Результат */
        #result-screen {
            text-align: center;
        }
        .score-text {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 20px 0;
            color: var(--accent);
        }
        .result-message {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .review-block {
            text-align: left;
            max-height: 300px;
            overflow-y: auto;
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .review-item {
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #3a3a3a;
        }
        .review-item:last-child {
            border-bottom: none;
        }
        .explanation {
            font-size: 0.9rem;
            color: #aaa;
            margin-top: 8px;
            font-style: italic;
        }
        .send-status {
            margin-top: 15px;
            font-size: 1rem;
            font-weight: normal;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Прогресс бар -->
    <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress"></div>
    </div>

    <!-- ЭКРАН 1: Ввод имени -->
    <div id="start-screen" class="screen active">
        <h1>Тест для бариста</h1>
        <p class="description">Перед началом теста, пожалуйста, представьтесь.</p>
        <input type="text" id="user-name" placeholder="Ваше Имя">
        <input type="text" id="user-surname" placeholder="Ваша Фамилия">
        <button class="btn" id="start-btn">Начать тест</button>
    </div>

    <!-- ЭКРАН 2: Вопросы -->
    <div id="quiz-screen" class="screen">
        <div id="question-container"></div>
        <button class="btn" id="next-btn" style="margin-top: 30px;" disabled>Далее</button>
    </div>

    <!-- ЭКРАН 3: Результат -->
    <div id="result-screen" class="screen">
        <h1>Тест завершен!</h1>
        <div class="score-text" id="score-text"></div>
        <div class="result-message" id="result-message"></div>
        
        <div class="review-block" id="review-block"></div>
        
        <div class="send-status" id="send-status">Отправка результатов...</div>
    </div>
</div>

<script>
    const questions = [
        {
            text: "Какая идеальная температура взбитого молока для классического капучино?",
            options: ["45–50 °C", "55–65 °C", "70–75 °C", "80–85 °C"],
            correct: 1,
            explanation: "Оптимально 60°C. Лактоза максимально сладкая, белки не разрушены."
        },
        {
            text: "Какая температура эспрессо в чашке сразу после приготовления?",
            options: ["60–65 °C", "70–75 °C", "85–90 °C", "95–100 °C"],
            correct: 2,
            explanation: "Варится при 90–96 °C, но в чашке остывает до 70–75 °C."
        },
        {
            text: "Что произойдет с молоком, если нагреть его выше 70 °C?",
            options: ["Станет слаще.", "Белки свернутся, молоко начнет горчить.", "Станет более густым.", "Ничего не изменится."],
            correct: 1,
            explanation: "Молоко «сгорает», становится водянистым, сладость пропадает."
        },
        {
            text: "Подвох: Бариста забыл взвесить кофе. Эспрессо вытек за 15 сек, бледный. Причина?",
            options: ["Вода слишком горячая.", "Давление упало.", "Кофе слишком мало (недозасып).", "Помол слишком крупный."],
            correct: 2,
            explanation: "Быстрый пролив и водянистость указывают на нестабильную дозировку."
        },
        {
            text: "Подвох: Клиент просит эспрессо «совсем без горечи». Лучший вариант?",
            options: ["Уменьшить дозу.", "Снять крема.", "Остановить экстракцию раньше.", "Посоветовать другой напиток."],
            correct: 3,
            explanation: "Без горечи эспрессо будет невыносимо кислым. Лучше предложить фильтр или молочный напиток."
        },
        {
            text: "Классический вес выхода двойного эспрессо при закладке 18 г?",
            options: ["18 грамм", "25 грамм", "36 грамм", "50 грамм"],
            correct: 2,
            explanation: "Стандартное соотношение 1:2."
        },
        {
            text: "Подвох: Что главное в правильной темперовке?",
            options: ["Усилие 15 кг.", "Усилие 30 кг.", "Абсолютно ровная поверхность.", "Два подхода."],
            correct: 2,
            explanation: "Усилие не важно после 2-3 кг. Главное — ровность таблетки."
        },
        {
            text: "Где кофеина больше: в чашке фильтр-кофе (200 мл) или в двойном эспрессо?",
            options: ["В фильтре меньше.", "Одинаково.", "В фильтре значительно больше.", "В эспрессо больше."],
            correct: 2,
            explanation: "Из-за долгого контакта воды с кофе, в фильтре кофеина гораздо больше."
        },
        {
            text: "Почему свежеобжаренный кофе (1-2 дня) дает рваную струйку?",
            options: ["Много СО2 мешает воде.", "Зерно влажное.", "Масло не вышло.", "Молышок неисправен."],
            correct: 0,
            explanation: "КО2 выталкивает воду, нужны 7-14 дней дегазации."
        },
        {
            text: "Чем флэт уайт отличается от капучино?",
            options: ["Там есть сироп.", "Двойной ристретто и меньше пены.", "Только овсяное молоко.", "Только посуда."],
            correct: 1,
            explanation: "Во флэт уайте пены 0.5 см, в капучино 1.5-2 см."
        },
        {
            text: "Подвох: Эспрессо льется тонкой темной струйкой с самого начала. Это значит, что:",
            options: ["Все идеально.", "Образовался канал прожига (channeling).", "Помол крупный.", "Машина перегрелась."],
            correct: 1,
            explanation: "Вода нашла дырку в таблетке и пробивает её под давлением."
        },
        {
            text: "Разница между арабикой и робустой?",
            options: ["Арабика горче.", "Робуста горче, в ней больше кофеина.", "Разницы нет.", "Робуста слаще."],
            correct: 1,
            explanation: "В робусте в 2 раза больше кофеина, она горькая и дает много крема."
        },
        {
            text: "Что делать, если эспрессо водянистый и течет 15 секунд?",
            options: ["Сделать помол мельче.", "Сделать помол крупнее.", "Сильнее трамбовать.", "Добавить кофе."],
            correct: 0,
            explanation: "Недоэкстракция. Мельче помол = больше сопротивление = правильное время."
        },
        {
            text: "Подвох: Клиент жалуется на «мутный» американо с пенкой. Почему?",
            options: ["Кипяток с накипью.", "Это кофейные масла и крема.", "Темная обжарка.", "Порвался фильтр."],
            correct: 1,
            explanation: "Мутность — это эфирные масла, знак хорошего кофе."
        },
        {
            text: "Как часто чистить группу слепым ситом?",
            options: ["Раз в неделю.", "Каждую смену.", "Раз в месяц.", "Когда начнет горчить."],
            correct: 1,
            explanation: "Масла прогоркают за день. Чистка обязательна каждый вечер."
        }
    ];

    let currentQuestion = 0;
    let score = 0;
    let userName = "";
    let userSurname = "";
    let userAnswers = [];

    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const progressBar = document.getElementById('progress');

    // Кнопка старта
    document.getElementById('start-btn').addEventListener('click', () => {
        userName = document.getElementById('user-name').value.trim();
        userSurname = document.getElementById('user-surname').value.trim();
        
        if (!userName || !userSurname) {
            alert('Введите имя и фамилию!');
            return;
        }

        startScreen.classList.remove('active');
        quizScreen.classList.add('active');
        showQuestion();
    });

    function showQuestion() {
        const q = questions[currentQuestion];
        const container = document.getElementById('question-container');
        
        // Обновляем прогресс-бар
        progressBar.style.width = `${((currentQuestion) / questions.length) * 100}%`;

        // Заполняем HTML с анимацией
        container.style.animation = 'none';
        container.offsetHeight; /* trigger reflow */
        container.style.animation = 'slideInRight 0.4s ease-out';

        container.innerHTML = `
            <div class="question-number">Вопрос ${currentQuestion + 1} из ${questions.length}</div>
            <div class="question-text">${q.text}</div>
            <div class="options-grid" id="options-grid"></div>
        `;

        const grid = document.getElementById('options-grid');
        q.options.forEach((option, index) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerText = option;
            div.addEventListener('click', () => selectOption(index, div));
            grid.appendChild(div);
        });

        // Скрываем кнопки ответов на старте вопроса
        document.getElementById('next-btn').disabled = true;
        document.getElementById('next-btn').innerText = currentQuestion === questions.length - 1 ? "Завершить тест" : "Далее";
    }

    function selectOption(index, element) {
        const q = questions[currentQuestion];
        const allOptions = document.querySelectorAll('.option');
        
        // Блокируем все варианты после выбора
        allOptions.forEach(opt => opt.style.pointerEvents = 'none');

        userAnswers.push(index);

        if (index === q.correct) {
            element.classList.add('correct');
            score++;
        } else {
            element.classList.add('incorrect');
            // Подсвечиваем правильный ответ
            allOptions[q.correct].classList.add('correct');
        }

        // Разблокируем кнопку "Далее"
        document.getElementById('next-btn').disabled = false;
    }

    // Кнопка "Далее"
    document.getElementById('next-btn').addEventListener('click', () => {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            showResults();
        }
    });

    function showResults() {
        quizScreen.classList.remove('active');
        resultScreen.classList.add('active');
        progressBar.style.width = `100%`;

        document.getElementById('score-text').innerText = `${score} / ${questions.length}`;
        
        let percentage = (score / questions.length) * 100;
        let msg = "";
        if (percentage === 100) msg = "Идеально! Вы гуру кофемании ☕";
        else if (percentage >= 70) msg = "Отличный результат! Вы знаете свое дело.";
        else if (percentage >= 50) msg = "Неплохо, но есть куда расти.";
        else msg = "Нужно подучить теорию.";

        document.getElementById('result-message').innerText = msg;

        // Генерация разбора ошибок
        const reviewBlock = document.getElementById('review-block');
        reviewBlock.innerHTML = '';
        questions.forEach((q, i) => {
            let statusColor = userAnswers[i] === q.correct ? 'var(--correct)' : 'var(--incorrect)';
            let statusText = userAnswers[i] === q.correct ? 'Верно' : 'Неверно';
            
            reviewBlock.innerHTML += `
                <div class="review-item">
                    <div style="color:${statusColor}; font-weight:bold;">${i+1}. ${statusText}</div>
                    <div>${q.text}</div>
                    <div class="explanation">${q.explanation}</div>
                </div>
            `;
        });

        // Отправка на почту
        sendEmail(msg);
    }

    // Отправка письма
    function sendEmail(message) {
        const fullName = `${userName} ${userSurname}`;
        const subject = `Тест бариста: ${fullName}`;
        
        // Формируем детальный отчет для почты
        let answersReport = "Детали ответов:\n";
        questions.forEach((q, i) => {
            let isCorrect = userAnswers[i] === q.correct ? "Верно" : "Неверно";
            let chosenAnswer = q.options[userAnswers[i]];
            answersReport += `${i+1}. ${isCorrect} (Ответ: ${chosenAnswer})\n`;
        });

        const textMessage = `
            Имя: ${userName}
            Фамилия: ${userSurname}
            Результат: ${score} из ${questions.length}
            Комментарий: ${message}
            Время: ${new Date().toLocaleString('ru-RU')}
            
            ${answersReport}
        `;

        fetch("https://formspree.io/f/xrewerad", {
            method: "POST",
            headers: { 
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                name: fullName,
                subject: subject,
                message: textMessage
            })
        })
        .then(response => {
            if (response.ok) {
                document.getElementById('send-status').innerHTML = "✅ Результат отправлен администратору.";
                document.getElementById('send-status').style.color = "var(--correct)";
            } else {
                throw new Error("Ошибка");
            }
        })
        .catch(error => {
            document.getElementById('send-status').innerHTML = "⚠️ Ошибка отправки письма.";
            document.getElementById('send-status').style.color = "var(--incorrect)";
        });
    }
</script>

</body>
</html>
